<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="logo">Netflix</h1>
        <h2>Quem está assistindo?</h2>
        <p class="select-message">Selecione o perfil que deseja usar para assistir</p>
        <button id="theme-toggle" aria-label="Alternar tema">🌙</button>
    </header>

    <main>
        <section aria-label="Perfis disponíveis">

            <ul class="profiles">

                <li>
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/foto.perfil.jpeg">
                            <figcaption>Vinicius</figcaption>
                        </figure>
                    </a>
                </li>

                <li>
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/foto.nana.png">
                            <figcaption>Mariana, namorada do Vinicius</figcaption>
                        </figure>
                    </a>
                </li>

                <li>
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/fotopai.png">
                            <figcaption>Lucas, pai do Vinicius</figcaption>
                        </figure>
                    </a>
                </li>

                <li>
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/fotomamae.png">
                            <figcaption>Rosilene, mãe do Vinicius</figcaption>
                        </figure>
                    </a>
                </li>

                <li>
                    <a href="catalogo/catalogo.html" class="profile">
                        <figure>
                            <img src="assets/fotoirma.png">
                            <figcaption>Vitoria, irmã do Vinicius</figcaption>
                        </figure>
                    </a>
                </li>

            </ul>

            <a href="#" class="manage-profiles">Gerenciar perfis</a>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
